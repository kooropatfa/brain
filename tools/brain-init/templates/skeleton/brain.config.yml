# brain.config.yml — the one knob that makes this Brain reusable across projects.
#
# This file is the SINGLE place that names the company/team and its dimensions. The skeleton
# (folders + MOC notes), the ingestion classifier, and the brain-sync helper all read from
# here instead of hardcoding a name. This file was generated by `brain-init` (the scaffolder
# in the Brain engine repo); edit `dimensions` here as the Brain grows.

# --- identity ---
company: {{COMPANY_YML}}              # display name used in README / MOC headers
repo: {{REPO}}                        # owner/name of THIS Brain repo (brain-sync targets this)
default_branch: main

# --- ingestion ---
# local (default): no API key — the session agent classifies + files captures itself and
# _inbox/ stays empty on the default branch (see the skill's "Local ingestion" section).
# action: the GitHub Action (needs the ANTHROPIC_API_KEY repo secret) classifies + files
# captures pushed to _inbox/.
ingestion: {{INGESTION}}

# --- dimensions ---
# Top-level folders = the lenses the company understands itself through. A flexible STARTING
# set, not a constitution. Add one by appending here + creating the folder and its index/MOC
# note. Each entry: folder name + one-line description for its MOC.
dimensions:
{{DIMENSIONS_YML}}

# --- fixed infrastructure folders (not dimensions) ---
# These always exist regardless of company. Listed so tooling knows them.
infra_folders:
  - _inbox        # loading dock — every raw capture lands here before classification
  - decisions     # the decisions log (ADRs)

# --- glossary ---
glossary_note: ubiquitous-language    # the shared-vocabulary stub note
