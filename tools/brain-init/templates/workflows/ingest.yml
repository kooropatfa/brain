# Thin shim — all logic lives in the Brain engine, pinned to the MOVING major tag v1: engine upgrades arrive automatically. Pin a commit SHA instead of v1 to freeze; a breaking engine release ships as @v2.
# Secrets: ANTHROPIC_API_KEY (optional — absent = pipeline stands down cleanly). Passed BY NAME (not
# `inherit`) because the engine reusable lives in a DIFFERENT org/repo (kooropatfa/brain) and GitHub
# does not forward repo-level secrets across repos via `inherit`. The value stays in YOUR repo's
# secret store; only the reference is mapped. Full contract: the reusable's header.
name: Ingest _inbox captures
on:
  push:
    branches: [main]
    paths: ["_inbox/**"]
  workflow_dispatch:
    inputs:
      capture:
        description: "Specific _inbox capture path to ingest (optional)"
        required: false
        type: string
concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  ingest:
    uses: kooropatfa/brain/.github/workflows/ingest-reusable.yml@v1
    with:
      capture: ${{ inputs.capture || '' }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
